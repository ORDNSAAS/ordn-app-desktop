name: Build Windows Installer

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ORDN-Setup
          path: dist/*.exe
          retention-days: 30
